<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>小手机</title>
<style>
/* ============================================================
   全局 CSS 变量 — 薰衣草系
   ============================================================ */
:root {
  --bg-base:                #f3f0fa;
  --bg-surface:             #ffffff;
  --bg-hover:               #ebe5f5;

  --color-primary:          #b8a4e0;
  --color-primary-light:    #ddd3f0;
  --color-primary-ultralight: #f0ecfa;
  --color-primary-deep:     #9d85cc;

  --color-accent:           #a5c4e0;
  --color-accent-light:     #dceaf5;

  --text-primary:           #4a4458;
  --text-secondary:         #8a82a0;
  --text-placeholder:       #b8b0c8;

  --shadow-soft:  0 2px 8px rgba(184, 164, 224, 0.15);
  --shadow-card:  0 4px 16px rgba(184, 164, 224, 0.18);
  --shadow-float: 0 8px 32px rgba(184, 164, 224, 0.22);
  --shadow-neu-out: 6px 6px 12px rgba(157, 133, 204, 0.15),
                    -6px -6px 12px rgba(255, 255, 255, 0.80);
  --shadow-neu-in:  inset 4px 4px 8px rgba(157, 133, 204, 0.12),
                    inset -4px -4px 8px rgba(255, 255, 255, 0.70);

  --radius-sm:   10px;
  --radius-md:   16px;
  --radius-lg:   20px;
  --radius-xl:   28px;
  --radius-full: 999px;

  --font-stack: 'PingFang SC', 'HarmonyOS Sans SC', 'Noto Sans SC', system-ui, sans-serif;
  --ease-soft: cubic-bezier(0.34, 1.56, 0.64, 1);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ============================================================
   Reset
   ============================================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: fixed;
  inset: 0;
  overscroll-behavior: none;
  font-family: var(--font-stack);
  line-height: 1.6;
  letter-spacing: 0.02em;
  background: var(--bg-base);
  color: var(--text-primary);
  user-select: none;
  -webkit-user-select: none;
}

button {
  padding: 0;
  background: transparent;
  border: none;
  color: inherit;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}

/* ============================================================
   页面容器
   ============================================================ */
#phone {
  position: relative;
  width: 100%;
  max-width: clamp(320px, 100vw, 600px);
  height: 100%;
  margin: 0 auto;
  overflow: hidden;
  background: var(--bg-base);
}

/* ============================================================
   桌面壁纸
   ============================================================ */
.wallpaper {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 12%, var(--color-primary-ultralight) 0%, transparent 50%),
    radial-gradient(circle at 82% 85%, var(--color-accent-light) 0%, transparent 55%),
    linear-gradient(160deg, var(--bg-base) 0%, var(--color-primary-ultralight) 100%);
}
.wallpaper::before,
.wallpaper::after {
  content: '';
  position: absolute;
  border-radius: var(--radius-full);
  filter: blur(48px);
  opacity: 0.45;
  pointer-events: none;
}
.wallpaper::before {
  width: 50vw; height: 50vw;
  max-width: 300px; max-height: 300px;
  top: -10%; right: -12%;
  background: var(--color-primary-light);
}
.wallpaper::after {
  width: 42vw; height: 42vw;
  max-width: 260px; max-height: 260px;
  bottom: 8%; left: -14%;
  background: var(--color-accent-light);
}

/* ============================================================
   桌面主体
   ============================================================ */
.desktop {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 1;
  transition: opacity 0.28s var(--ease-soft), transform 0.28s var(--ease-soft);
}
.desktop.hidden {
  opacity: 0;
  transform: scale(0.96);
  pointer-events: none;
}

/* ============================================================
   顶部状态胶囊
   ============================================================ */
.status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 8;
  height: calc(54px + var(--safe-top));
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: var(--safe-top) 20px 7px;
  pointer-events: none;
}
.status-pill {
  width: min(74vw, 336px);
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 9px;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  background: color-mix(in srgb, var(--bg-surface) 88%, transparent);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}
.status-pill svg {
  width: 22px;
  height: 22px;
  flex: 0 0 auto;
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0.86;
}
.status-pill svg:nth-child(even) {
  stroke: var(--color-accent);
}
.status-pill .paw {
  stroke: var(--color-primary-deep);
}

/* ============================================================
   小组件区
   ============================================================ */
.widgets {
  position: absolute;
  top: calc(58px + var(--safe-top));
  left: 0;
  right: 0;
  padding: 0 clamp(16px, 4vw, 24px);
  z-index: 2;
}
.widget-row {
  display: flex;
  gap: clamp(8px, 2.5vw, 14px);
  margin-bottom: clamp(8px, 2vw, 12px);
}
.widget {
  background: color-mix(in srgb, var(--bg-surface) 82%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  transition: transform 0.25s var(--ease-soft);
}
.widget:active {
  transform: scale(0.97);
}

/* 时间小组件 */
.widget-clock {
  flex: 1;
  padding: clamp(14px, 3.5vw, 18px) clamp(16px, 4vw, 22px);
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: clamp(100px, 26vw, 132px);
}
.widget-clock .clock-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.widget-clock .clock-label {
  font-size: clamp(11px, 3vw, 13px);
  font-weight: 500;
  color: var(--text-secondary);
}
.widget-clock .clock-icon-box {
  width: clamp(28px, 7.5vw, 36px);
  height: clamp(28px, 7.5vw, 36px);
  border-radius: var(--radius-md);
  background: var(--color-primary-ultralight);
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-clock .clock-icon-box svg {
  width: clamp(16px, 4.5vw, 20px);
  height: clamp(16px, 4.5vw, 20px);
  stroke: var(--color-primary-deep);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.widget-clock .clock-time {
  font-size: clamp(32px, 9vw, 44px);
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.04em;
  line-height: 1;
}
.widget-clock .clock-date {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--text-secondary);
  margin-top: clamp(3px, 1vw, 5px);
}

/* 天气小组件 */
.widget-weather {
  width: clamp(96px, 27vw, 140px);
  flex-shrink: 0;
  padding: clamp(12px, 3vw, 16px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: clamp(100px, 26vw, 132px);
}
.widget-weather .weather-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.widget-weather .weather-label {
  font-size: clamp(11px, 3vw, 13px);
  font-weight: 500;
  color: var(--text-secondary);
}
.widget-weather .weather-icon-box {
  width: clamp(28px, 7.5vw, 36px);
  height: clamp(28px, 7.5vw, 36px);
  border-radius: var(--radius-md);
  background: var(--color-accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-weather .weather-icon-box svg {
  width: clamp(16px, 4.5vw, 20px);
  height: clamp(16px, 4.5vw, 20px);
  stroke: var(--color-accent);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.widget-weather .weather-value {
  font-size: clamp(13px, 3.5vw, 16px);
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
}

/* 今日提示小组件 */
.widget-tip {
  padding: clamp(12px, 3vw, 16px) clamp(14px, 4vw, 20px);
  display: flex;
  align-items: center;
  gap: clamp(10px, 2.5vw, 14px);
}
.widget-tip .tip-icon-box {
  width: clamp(30px, 8vw, 38px);
  height: clamp(30px, 8vw, 38px);
  flex-shrink: 0;
  border-radius: var(--radius-md);
  background: var(--color-primary-ultralight);
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-tip .tip-icon-box svg {
  width: clamp(16px, 4.5vw, 20px);
  height: clamp(16px, 4.5vw, 20px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.widget-tip .tip-content {
  flex: 1;
  min-width: 0;
}
.widget-tip .tip-title {
  font-size: clamp(13px, 3.5vw, 16px);
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}
.widget-tip .tip-desc {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--text-secondary);
  margin-top: 2px;
}

/* 黑胶唱片小组件 */
.widget-vinyl {
  margin-top: clamp(8px, 2vw, 12px);
  padding: clamp(12px, 3vw, 16px);
  display: flex;
  align-items: center;
  gap: clamp(12px, 3vw, 16px);
}
.vinyl-disc-wrap {
  position: relative;
  flex-shrink: 0;
  width: clamp(64px, 17vw, 84px);
  height: clamp(64px, 17vw, 84px);
}
.vinyl-disc {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: color-mix(in srgb, var(--text-primary) 88%, transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: vinyl-spin 4s linear infinite;
  animation-play-state: paused;
}
.vinyl-disc.spinning {
  animation-play-state: running;
}
.vinyl-groove {
  position: absolute;
  border-radius: 50%;
  border: 1px solid color-mix(in srgb, var(--text-primary) 12%, transparent);
  pointer-events: none;
}
.vinyl-groove-1 { width: 88%; height: 88%; top: 6%; left: 6%; }
.vinyl-groove-2 { width: 72%; height: 72%; top: 14%; left: 14%; }
.vinyl-groove-3 { width: 56%; height: 56%; top: 22%; left: 22%; }
.vinyl-cover {
  width: clamp(28px, 7vw, 36px);
  height: clamp(28px, 7vw, 36px);
  border-radius: 50%;
  background: color-mix(in srgb, var(--color-primary) 30%, var(--bg-surface));
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.vinyl-cover svg {
  width: clamp(14px, 3.5vw, 18px);
  height: clamp(14px, 3.5vw, 18px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.vinyl-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: clamp(3px, 1vw, 5px);
}
.vinyl-title {
  font-size: clamp(13px, 3.5vw, 15px);
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.vinyl-artist {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.vinyl-controls {
  display: flex;
  align-items: center;
  gap: clamp(6px, 1.5vw, 8px);
  margin-top: clamp(2px, 0.5vw, 4px);
}
.vinyl-btn {
  width: clamp(28px, 7vw, 34px);
  height: clamp(28px, 7vw, 34px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, var(--bg-base) 40%, transparent);
  box-shadow: var(--shadow-soft);
  transition: transform 0.2s var(--ease-soft);
}
.vinyl-btn:active {
  transform: scale(0.88);
}
.vinyl-btn svg {
  width: clamp(14px, 3.5vw, 16px);
  height: clamp(14px, 3.5vw, 16px);
  stroke: var(--text-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.vinyl-btn.main {
  width: clamp(34px, 8.5vw, 40px);
  height: clamp(34px, 8.5vw, 40px);
  background: var(--color-primary);
}
.vinyl-btn.main svg {
  stroke: var(--bg-surface);
  width: clamp(16px, 4vw, 18px);
  height: clamp(16px, 4vw, 18px);
}

/* ============================================================
   APP 图标网格
   ============================================================ */
.app-grid {
  position: absolute;
  top: clamp(330px, 72vw, 480px);
  bottom: calc(108px + var(--safe-bottom));
  left: 0;
  right: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: min-content;
  gap: clamp(14px, 4vw, 24px) clamp(8px, 2.5vw, 16px);
  padding: 0 clamp(16px, 4vw, 24px);
  align-content: start;
  z-index: 2;
}
.app-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(5px, 1.3vw, 7px);
  transition: transform 0.2s var(--ease-soft);
}
.app-icon:active {
  transform: scale(0.93);
}
.app-icon .icon-box {
  position: relative;
  width: clamp(50px, 14vw, 60px);
  height: clamp(50px, 14vw, 60px);
  background: color-mix(in srgb, var(--bg-surface) 86%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  justify-content: center;
}
.app-icon .icon-box svg {
  width: clamp(24px, 6.5vw, 30px);
  height: clamp(24px, 6.5vw, 30px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.app-icon .icon-label {
  font-size: clamp(10px, 2.8vw, 12px);
  font-weight: 500;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.2;
  max-width: clamp(70px, 18vw, 84px);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.app-icon .badge {
  position: absolute;
  top: -4px;
  right: 6px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  background: var(--color-primary-deep);
  color: var(--bg-surface);
  font-size: 11px;
  font-weight: 600;
  line-height: 1;
  box-shadow: var(--shadow-soft);
}
.app-icon .badge.hidden {
  display: none;
}

/* ============================================================
   页面指示器
   ============================================================ */
.page-dots {
  position: absolute;
  bottom: calc(100px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 7px;
  z-index: 4;
}
.page-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  background: var(--text-placeholder);
  opacity: 0.5;
  transition: all 0.25s var(--ease-soft);
}
.page-dot.active {
  width: 20px;
  background: var(--color-primary);
  opacity: 0.9;
}

/* ============================================================
   底部 Dock
   ============================================================ */
.dock {
  position: absolute;
  bottom: calc(18px + var(--safe-bottom));
  left: clamp(16px, 4vw, 24px);
  right: clamp(16px, 4vw, 24px);
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 8px;
  padding: clamp(9px, 2.5vw, 12px) clamp(12px, 3vw, 16px);
  border-radius: var(--radius-xl);
  background: color-mix(in srgb, var(--bg-surface) 76%, transparent);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-float);
}
.dock-item {
  position: relative;
  width: clamp(48px, 13vw, 58px);
  height: clamp(48px, 13vw, 58px);
  background: color-mix(in srgb, var(--bg-surface) 92%, transparent);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s var(--ease-soft);
}
.dock-item:active {
  transform: scale(0.90);
}
.dock-item svg {
  width: clamp(22px, 6vw, 27px);
  height: clamp(22px, 6vw, 27px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.dock-item .badge {
  position: absolute;
  top: -2px;
  right: -2px;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  background: var(--color-primary-deep);
  color: var(--bg-surface);
  font-size: 10px;
  font-weight: 600;
  border: 2px solid var(--bg-surface);
}
.dock-item .badge.hidden {
  display: none;
}

/* ============================================================
   APP 预览页
   ============================================================ */
.app-page {
  position: absolute;
  inset: 0;
  z-index: 30;
  background: var(--bg-base);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: opacity 0.28s var(--ease-soft), transform 0.28s var(--ease-soft);
}
.app-page.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.app-topbar {
  min-height: calc(58px + var(--safe-top));
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  padding: var(--safe-top) 20px 12px;
  background: color-mix(in srgb, var(--bg-base) 88%, transparent);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}
.app-back {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s var(--ease-soft);
}
.app-back:active {
  transform: scale(0.88);
}
.app-back svg {
  width: 20px;
  height: 20px;
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.app-title {
  flex: 1;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  text-align: center;
}
.app-topbar-spacer {
  width: 38px;
  flex: 0 0 38px;
}
.app-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 24px calc(42px + var(--safe-bottom));
}
.placeholder-card {
  width: min(100%, 420px);
  padding: clamp(24px, 6vw, 36px);
  border-radius: var(--radius-xl);
  background: var(--bg-surface);
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(12px, 3vw, 18px);
  text-align: center;
  animation: softPop 0.3s var(--ease-soft);
}
.placeholder-icon {
  width: clamp(52px, 14vw, 64px);
  height: clamp(52px, 14vw, 64px);
  border-radius: var(--radius-lg);
  background: var(--color-primary-ultralight);
  display: flex;
  align-items: center;
  justify-content: center;
}
.placeholder-icon svg {
  width: clamp(26px, 7vw, 32px);
  height: clamp(26px, 7vw, 32px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.placeholder-title {
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 600;
  color: var(--text-primary);
}
.placeholder-text {
  font-size: clamp(13px, 3.5vw, 15px);
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ============================================================
   锁屏
   ============================================================ */
.lock-screen {
  position: absolute;
  inset: 0;
  z-index: 900;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  padding: calc(68px + var(--safe-top)) 24px calc(36px + var(--safe-bottom));
  background: var(--bg-base);
  transition: all 0.25s var(--ease-soft);
}
.lock-screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.02);
}
.lock-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(circle at 30% 20%, var(--color-primary-ultralight) 0%, transparent 50%),
    radial-gradient(circle at 70% 80%, var(--color-accent-light) 0%, transparent 55%),
    linear-gradient(160deg, var(--bg-base) 0%, var(--color-primary-ultralight) 100%);
}
.lock-top {
  position: relative;
  z-index: 1;
  text-align: center;
}
.lock-avatar {
  width: clamp(72px, 20vw, 88px);
  height: clamp(72px, 20vw, 88px);
  margin: 0 auto clamp(16px, 4vw, 22px);
  border-radius: var(--radius-xl);
  background: var(--bg-surface);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.lock-avatar svg {
  width: clamp(36px, 10vw, 44px);
  height: clamp(36px, 10vw, 44px);
  stroke: var(--color-primary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.lock-title {
  font-size: clamp(20px, 5.5vw, 24px);
  font-weight: 600;
  color: var(--text-primary);
}
.lock-subtitle {
  margin-top: 8px;
  font-size: clamp(13px, 3.5vw, 15px);
  color: var(--text-secondary);
}
.lock-dots {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 26px;
}
.lock-dot {
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  background: color-mix(in srgb, var(--text-placeholder) 48%, transparent);
  transition: all 0.2s var(--ease-soft);
}
.lock-dot.filled {
  background: var(--color-primary);
  transform: scale(1.08);
}
.lock-error {
  min-height: 22px;
  margin-top: 18px;
  font-size: clamp(12px, 3vw, 14px);
  color: var(--color-primary-deep);
  text-align: center;
}
.lock-pad {
  position: relative;
  z-index: 1;
  width: min(100%, 320px);
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.lock-key {
  height: clamp(56px, 15vw, 66px);
  border-radius: var(--radius-xl);
  background: color-mix(in srgb, var(--bg-surface) 86%, transparent);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-soft);
  font-size: clamp(20px, 5vw, 24px);
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease-soft);
}
.lock-key:active {
  transform: scale(0.94);
  background: var(--color-primary-ultralight);
}
.lock-key.secondary {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-secondary);
}

/* ============================================================
   加载动画
   ============================================================ */
.loading {
  position: absolute;
  inset: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-base);
  transition: opacity 0.25s var(--ease-soft);
}
.loading.hide {
  opacity: 0;
  pointer-events: none;
}
.loading-card {
  min-width: 160px;
  padding: 22px;
  border-radius: var(--radius-xl);
  background: var(--bg-surface);
  box-shadow: var(--shadow-card);
  text-align: center;
}
.loading-mark {
  width: 38px;
  height: 38px;
  margin: 0 auto 12px;
  border-radius: var(--radius-md);
  background: var(--color-primary-ultralight);
  animation: soft-pulse 1.4s ease-in-out infinite;
}
.loading-text {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-secondary);
}

/* ============================================================
   动效
   ============================================================ */
@keyframes softPop {
  from { opacity: 0; transform: scale(0.94) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes vinyl-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes soft-pulse {
  0%   { transform: scale(0.92); opacity: 0.55; }
  50%  { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.92); opacity: 0.55; }
}
</style>
</head>

<script>

  smile:   '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8.5 14.5c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8"/></svg>',
  memory:  '<svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 012-2h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M8 3v18M16 3v18"/><path d="M10 8h2M10 12h2"/></svg>',

/* ============================================================
   APP 列表（预览用，正式版从注册表读取）
   ============================================================ */
var APPS = [
  { id: 'chat',       name: '聊天',   icon: 'chat',     dock: true,  badge: 3 },
  { id: 'moments',    name: '朋友圈', icon: 'camera',   dock: true,  badge: 0 },
  { id: 'settings',   name: '设置',   icon: 'settings', dock: true,  badge: 0 },
  { id: 'gallery',    name: '记仇本', icon: 'grudge',   dock: true,  badge: 0 },

  { id: 'wallet',     name: '钱包',   icon: 'transfer', dock: false, badge: 0 },
  { id: 'shop',       name: '商店',   icon: 'star',     dock: false, badge: 0 },
  { id: 'memo',       name: '备忘录', icon: 'edit',     dock: false, badge: 0 },
  { id: 'anniversary',name: '纪念日', icon: 'check',    dock: false, badge: 0 },
  { id: 'games',      name: '游戏',   icon: 'play',     dock: false, badge: 0 },
  { id: 'music',      name: '音乐',   icon: 'music',    dock: false, badge: 0 }
];

/* ============================================================
   渲染 APP 图标
   ============================================================ */
function renderApps() {
  var grid = document.getElementById('appGrid');
  var dock = document.getElementById('dock');
  grid.innerHTML = '';
  dock.innerHTML = '';

  APPS.forEach(function(app) {
    var el = createAppIcon(app);
    if (app.dock) {
      el.classList.add('dock-item');
      el.classList.remove('app-icon');
      dock.appendChild(el);
    } else {
      grid.appendChild(el);
    }
  });
}

function createAppIcon(app) {
  var el = document.createElement('div');
  el.className = 'app-icon';
  el.setAttribute('data-app', app.id);

  var box = document.createElement('div');
  box.className = 'icon-box';
  box.innerHTML = ICONS[app.icon] || ICONS.star;

  if (app.badge && app.badge > 0) {
    var badge = document.createElement('div');
    badge.className = 'badge';
    badge.textContent = app.badge > 99 ? '99+' : String(app.badge);
    box.appendChild(badge);
  }

  var label = document.createElement('div');
  label.className = 'icon-label';
  label.textContent = app.name;

  el.appendChild(box);
  el.appendChild(label);

  el.addEventListener('click', function() {
    openApp(app);
  });

  return el;
}

/* ============================================================
   时钟
   ============================================================ */
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var clockEl = document.getElementById('clockTime');
  var dateEl = document.getElementById('clockDate');
  if (clockEl) clockEl.textContent = h + ':' + m;

  var months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var weeks = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  if (dateEl) dateEl.textContent = months[now.getMonth()] + now.getDate() + '日 ' + weeks[now.getDay()];
}

/* ============================================================
   打开 / 关闭 APP
   ============================================================ */
function openApp(app) {
  var desktop = document.getElementById('desktop');
  var appPage = document.getElementById('appPage');

  document.getElementById('appTitle').textContent = app.name;
  document.getElementById('placeholderName').textContent = app.name;

  var iconEl = document.getElementById('placeholderIcon');
  iconEl.innerHTML = ICONS[app.icon] || ICONS.star;

  desktop.classList.add('hidden');

  var card = document.getElementById('placeholderCard');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';

  setTimeout(function() {
    appPage.classList.add('visible');
  }, 50);
}

function closeApp() {
  var desktop = document.getElementById('desktop');
  var appPage = document.getElementById('appPage');

  appPage.classList.remove('visible');

  setTimeout(function() {
    desktop.classList.remove('hidden');
  }, 50);
}

/* ============================================================
   黑胶唱片
   ============================================================ */
var vinylPlaying = false;

function toggleVinyl() {
  vinylPlaying = !vinylPlaying;
  var disc = document.getElementById('vinylDisc');
  var btnIcon = document.getElementById('vinylBtnIcon');
  var titleEl = document.getElementById('vinylTitle');
  var artistEl = document.getElementById('vinylArtist');

  if (vinylPlaying) {
    disc.classList.add('spinning');
    btnIcon.innerHTML = ICONS.pause;
    titleEl.textContent = '假装在放歌';
    artistEl.textContent = '预览模式';
  } else {
    disc.classList.remove('spinning');
    btnIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z"/></svg>';
    titleEl.textContent = '还没有歌曲呢';
    artistEl.textContent = '去音乐里挑一首吧';
  }
}

/* ============================================================
   锁屏
   ============================================================ */
var LOCK_PASSWORD = '0326';
var lockInput = '';

function setupLock() {
  var pad = document.getElementById('lockPad');
  pad.addEventListener('click', function(e) {
    var key = e.target.closest('[data-key]');
    if (!key) return;
    var val = key.dataset.key;

    if (val === 'clear') {
      lockInput = '';
      document.getElementById('lockError').textContent = '';
      renderLockDots();
      return;
    }
    if (val === 'delete') {
      lockInput = lockInput.slice(0, -1);
      document.getElementById('lockError').textContent = '';
      renderLockDots();
      return;
    }
    if (lockInput.length >= LOCK_PASSWORD.length) return;
    lockInput += val;
    document.getElementById('lockError').textContent = '';
    renderLockDots();

    if (lockInput.length === LOCK_PASSWORD.length) {
      setTimeout(checkLock, 120);
    }
  });
}

function renderLockDots() {
  var dots = document.querySelectorAll('#lockDots .lock-dot');
  dots.forEach(function(dot, i) {
    dot.classList.toggle('filled', i < lockInput.length);
  });
}

function checkLock() {
  if (lockInput === LOCK_PASSWORD) {
    document.getElementById('lockScreen').classList.add('hidden');
  } else {
    lockInput = '';
    document.getElementById('lockError').textContent = '嘿嘿，不对哦';
    renderLockDots();
  }
}

/* ============================================================
   启动
   ============================================================ */
function boot() {
  renderApps();
  updateClock();
  setInterval(updateClock, 1000);
  setupLock();

  setTimeout(function() {
    var loading = document.getElementById('loading');
    loading.classList.add('hide');
    setTimeout(function() {
      loading.style.display = 'none';
    }, 260);
  }, 800);
}

boot();
</script>
